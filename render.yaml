# Render Blueprint — Aviator dev environment
# Two Docker web services from this monorepo. MongoDB Atlas + Redis Cloud are
# external (entered as secrets). Deploy: Render Dashboard → New → Blueprint →
# connect this repo. Secrets (sync:false) are entered in the dashboard on create.
#
# NOTE: the *.onrender.com URLs below assume these exact service names are free.
# If Render appends a suffix because a name is taken, update the URLs accordingly.
services:
  # ── Backend: Express + Socket.io game server ──────────────────
  - type: web
    name: aviator-crash-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://aviator-crash-web.onrender.com
      # Strong secrets generated by Render (not stored in the repo)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Game config (defaults are fine; tune in dashboard if desired)
      - key: HOUSE_EDGE
        value: "0.03"
      - key: MIN_BET
        value: "1"
      - key: MAX_BET
        value: "1000"
      - key: BETTING_WINDOW_MS
        value: "10000"
      - key: ROUND_PAUSE_MS
        value: "6000"
      # Secrets — entered in the Render dashboard on Blueprint creation
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # ── Frontend: Next.js 14 ──────────────────────────────────────
  - type: web
    name: aviator-crash-web
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /
    envVars:
      # NEXT_PUBLIC_* are baked at build time (Render passes them as build args).
      - key: NEXT_PUBLIC_API_URL
        value: https://aviator-crash-api.onrender.com
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://aviator-crash-api.onrender.com
